services:
  postgres:
    image: postgres:16
    container_name: vbank-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: vbank
      POSTGRES_PASSWORD: vbank_password
      POSTGRES_DB: vbank_users

    ports:
      - "5432:5432"

    volumes:
      - vbank-postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vbank -d vbank_users"]
      interval: 5s
      timeout: 5s
      retries: 10
  transaction-service:
        build:
          context: ../transaction-service
          dockerfile: Dockerfile

        container_name: transaction-service

        ports:
          - "8083:8083"

        depends_on:
          postgres:
            condition: service_healthy
  user-service:
    build:
      context: ../user-service
      dockerfile: Dockerfile

    container_name: user-service

    ports:
      - "8081:8081"

    depends_on:
      postgres:
        condition: service_healthy
  account-service:
      build:
        context: ../account-service
        dockerfile: Dockerfile

      container_name: account-service

      ports:
        - "8082:8082"

      depends_on:
        postgres:
          condition: service_healthy

  bff-service:
    build:
      context: ../bff-service
      dockerfile: Dockerfile
    container_name: bff-service
    environment:
      BFF_SERVICE_PORT: 8084
      USER_SERVICE_BASE_URL: http://user-service:8081
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8082
      TRANSACTION_SERVICE_BASE_URL: http://transaction-service:8083
      BFF_CONNECT_TIMEOUT: ${BFF_CONNECT_TIMEOUT:-2s}
      BFF_RESPONSE_TIMEOUT: ${BFF_RESPONSE_TIMEOUT:-3s}
      BFF_REQUEST_TIMEOUT: ${BFF_REQUEST_TIMEOUT:-4s}
      BFF_TRANSACTION_CONCURRENCY: ${BFF_TRANSACTION_CONCURRENCY:-8}
    ports:
      - "8084:8084"
    depends_on:
      user-service:
        condition: service_started
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started

volumes:
  vbank-postgres-data: